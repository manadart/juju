type: charm
name: model-info-consumer
summary: Test charm that consumes scriptlet model information
description: |
  This test charm consumes the scriptlet-model-info relation interface and
  records the remote controller UUID and model name for an action to report.
requires:
  model-info:
    interface: scriptlet-model-info
platforms:
  "ubuntu@22.04:amd64":
  "ubuntu@24.04:amd64":
parts:
  include:
    plugin: dump
    source: .
    prime:
      - actions
      - actions.yaml
      - hooks
      - manifest.yaml
