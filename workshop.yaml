name: workshop-openrouter-opencode
base: ubuntu@24.04
sdks:
  - name: opencode
    channel: latest/stable
  - name: direnvrc
    channel: latest/stable
  - name: go
    channel: 1.26/stable

actions:
  opencode:     direnv exec /project opencode "$@"
  opencode-run: direnv exec /project opencode run -m openrouter/anthropic/claude-haiku-4.5 "$@"
